<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Site Register — MCQ Quiz Book</title>
<meta name="description" content="Turn your MCQ text files into inspection-style practice quizzes." />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0F3460" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Site Register" />
<link rel="apple-touch-icon" href="icons/icon-apple-touch.png" />
<link rel="icon" href="icons/icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="grid-backdrop"></div>

<header class="topbar">
  <div class="topbar-inner">
    <a href="#/home" class="brand">
      <span class="brand-mark">QC</span>
      <span class="brand-text">
        <span class="brand-title">Site Register</span>
        <span class="brand-sub">MCQ Quiz Book</span>
      </span>
    </a>
    <button id="addQuizBtn" class="btn btn-stamp" type="button">+ New Quiz</button>
  </div>
</header>

<main id="app" class="app"></main>

<footer class="foot-note">
  <p>Sheet stored locally on this device · No account, no upload to any server</p>
</footer>

<!-- Templates -->

<template id="tpl-home">
  <section class="view view-home">
    <div class="titleblock">
      <div class="titleblock-row">
        <span class="tb-label">Project</span>
        <span class="tb-value">Question Bank Register</span>
      </div>
      <div class="titleblock-row">
        <span class="tb-label">Sheets on file</span>
        <span class="tb-value" id="quizCount">0</span>
      </div>
    </div>

    <div id="quizList" class="quiz-list"></div>

    <div id="emptyState" class="empty-state" hidden>
      <div class="empty-stamp">∅</div>
      <h2>No sheets logged yet</h2>
      <p>Upload a formatted .txt question bank to open your first register entry.</p>
      <button class="btn btn-stamp" data-action="add">+ New Quiz</button>
    </div>
  </section>
</template>

<template id="tpl-add">
  <section class="view view-add">
    <a href="#/home" class="back-link">&larr; Back to register</a>
    <h1 class="view-title">Log a New Sheet</h1>
    <p class="view-sub">Upload a .txt file formatted with <strong>Q1.</strong>, options <strong>A)–D)</strong>, a <strong>✅ CORRECT</strong> marker on the right answer, and an <strong>Explanation:</strong> line.</p>

    <form id="addForm" class="add-form">
      <label class="field">
        <span class="field-label">Sheet title</span>
        <input type="text" id="titleInput" placeholder="e.g. Soil Mechanics — 30 Questions" autocomplete="off" />
      </label>

      <label class="field file-field" id="fileDrop">
        <span class="field-label">Question bank (.txt)</span>
        <input type="file" id="fileInput" accept=".txt,text/plain" />
        <span class="file-hint" id="fileHint">Tap to choose a file, or drop it here</span>
      </label>

      <div id="parsePreview" class="parse-preview" hidden></div>
      <div id="parseError" class="parse-error" hidden></div>

      <button type="submit" class="btn btn-stamp btn-block" id="saveBtn" disabled>Stamp &amp; Save</button>
    </form>

    <details class="format-help">
      <summary>Exact format expected</summary>
      <pre>Q1. Question text goes here?

A) First option
B) Second option
C) Third option  ✅ CORRECT
D) Fourth option

Explanation: Why C is correct.

------------------------------------------------</pre>
      <p>Blocks are separated by a line of dashes. Only the option carrying <code>✅</code> is treated as correct — the checkmark and anything after it is stripped before showing the option, so it won't give the answer away.</p>
    </details>
  </section>
</template>

<template id="tpl-quiz">
  <section class="view view-quiz">
    <div class="quiz-head">
      <a href="#/home" class="back-link" data-confirm-exit>&larr; Exit</a>
      <div class="quiz-progress">
        <span class="mono" id="qIndex">Q 01</span>
        <span class="progress-sep">/</span>
        <span class="mono" id="qTotal">25</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="exam-sheet">
      <p class="question-text" id="questionText"></p>
      <div class="options" id="optionsList"></div>
      <div class="explain-note" id="explainNote" hidden>
        <span class="explain-label">Site note</span>
        <p id="explainText"></p>
      </div>
    </div>

    <div class="quiz-actions">
      <button class="btn btn-ghost" id="prevBtn" type="button" hidden>&larr; Previous</button>
      <button class="btn btn-stamp" id="nextBtn" type="button" hidden>Next Question &rarr;</button>
    </div>
  </section>
</template>

<template id="tpl-result">
  <section class="view view-result">
    <div class="result-card">
      <div class="result-stamp" id="resultStamp">PASS</div>
      <h1 class="view-title" id="resultTitle">Inspection Complete</h1>
      <p class="result-score"><span class="mono" id="resultScore">0/0</span></p>
      <p class="result-pct" id="resultPct"></p>
      <div class="result-actions">
        <button class="btn btn-stamp" id="retakeBtn">Retake Sheet</button>
        <a href="#/home" class="btn btn-ghost">Back to Register</a>
      </div>
    </div>
  </section>
</template>

<script src="app.js"></script>
</body>
</html>
